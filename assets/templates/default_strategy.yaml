base_currency: CNY

groups:
  S&P 500: [VOO, CSPX]
  纳斯达克 100: [QQQM, CSNDX]
  大宗商品: [PDBC, ICOM]

targets:
  S&P 500: 0.20
  纳斯达克 100: 0.20
  TLT: 0.10
  IDTL: 0.15
  IDTP: 0.10
  BOXX: 0.05
  GLDM: 0.10
  大宗商品: 0.10

rules:
  buy_underweight_first: true
  optional_rebalance_threshold: 0.05
  mandatory_rebalance_threshold: 0.08
  prefer_whole_shares: true
  support_fractional_output: true
  ignore_market_timing: true

notes:
  - 这是长期规则型投资组合
  - 新钱优先买低配资产
  - 非必要不改结构
  - 同组资产先按组偏差计算，再拆分到组内 ticker
